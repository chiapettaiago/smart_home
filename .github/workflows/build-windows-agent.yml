name: Build Windows Agent

on:
  workflow_dispatch:
  push:
    paths:
      - "agent/**"
      - ".github/workflows/build-windows-agent.yml"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: powershell
        run: .\agent\build\windows\build.ps1 -Python python -Clean

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeAgentSetup-windows-x64
          path: dist/windows/SmartHomeAgentSetup.exe
          if-no-files-found: error
